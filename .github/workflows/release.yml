name: Build and Release Multi-Platform Executables

on:
  push:
    tags:
      - 'v*' # Triggers when pushing a version tag, e.g., v1.0.0

jobs:
  build-and-release:
    strategy:
      matrix:
        # Runs the workflow on both Ubuntu (Linux) and Windows runners
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: harmony-client-linux
            package_command: jpackage --type app-image --dest dist --name harmony-client --input target --main-jar protochat-1.0-SNAPSHOT.jar --main-class harmony.proto.client.ClientApp
          - os: windows-latest
            artifact_name: harmony-client-windows.exe
            # Creates a single Windows .exe installer
            package_command: jpackage --type exe --dest dist --name harmony-client-windows --input target --main-jar protochat-1.0-SNAPSHOT.jar --main-class harmony.proto.client.ClientApp --win-console

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'oracle'
          cache: maven

      # 1. Build a "Fat" shadow JAR containing dependencies first
      - name: Build Package with Maven
        run: mvn clean package -DskipTests

      # 2. Run jpackage to bundle the JRE and JAR into a native binary
      - name: Package Native Executable
        run: ${{ matrix.package_command }}

      # 3. Zip or prepare the distribution files for upload
      - name: Prepare Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czf harmony-client-linux.tar.gz -C dist harmony-client

      # 4. Upload the specific native binaries directly to the GitHub Release page
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            harmony-client-linux.tar.gz
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}